version: '3'

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=board_game
      - POSTGRES_USER=board
      - POSTGRES_PASSWORD=*game*
      - TZ=Asia/Seoul
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7.2.3
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - backend

volumes:
  db_data:
  redis_data:

networks:
  backend: