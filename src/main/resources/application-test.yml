spring:
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:postgresql:16://localhost:15432/board-game
    username: 'board'
    password: '*game*'
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  data:
    redis:
      host: localhost
      port: 16379

logging:
  level:
    org.hibernate.orm.jdbc.bind: trace
    com.jsm.boardgame: debug

security:
  jwt:
    secret-key: 'EW0xlmBw6ne6zYpUPveFjrG0xrOx2Ja8I9XIFFVdEIiyeFcklfedsHX9lM8RvT0Q'
    expiry-seconds: 3600
    refresh:
      length: 256
      expiry-seconds: 604800
      deadline-days: 6
