spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/board_game
    username: 'board'
    password: '*game*'
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      enabled: true
      max-request-size: 10MB
      max-file-size: 10MB

logging:
  level:
    org.hibernate.orm.jdbc.bind: trace
    com.jsm.boardgame: debug

security:
  jwt:
    secret-key: 'EW0xlmBw6ne6zYpUPveFjrG0xrOx2Ja8I9XIFFVdEIiyeFcklfedsHX9lM8RvT0Q'
    expiry-seconds: 3600
    refresh:
      length: 256
      expiry-seconds: 604800
      deadline-days: 6
  cors:
    host:
      front: http://localhost:3000

file:
  upload-path: E:\upload
  image-limit-size: 10MB
  image-server-host: http://localhost:4000
